version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: pollarsteps-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pollarsteps
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  travel-intelligence:
    build: ./services/travel_intelligence
    container_name: pollarsteps-intelligence
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend_app
    container_name: pollarsteps-backend
    env_file:
      - ./backend_app/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/pollarsteps
      TRAVEL_INTELLIGENCE_URL: http://travel-intelligence:8001
    depends_on:
      db:
        condition: service_healthy
      travel-intelligence:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: pollarsteps-frontend
    environment:
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-your-mapbox-token}
      API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:
