name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend_app/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite pytest-asyncio

      - name: Lint with ruff (non-blocking)
        run: pip install ruff && ruff check app/ || true

      - name: Run tests
        env:
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: PYTHONPATH=. pytest tests/test_api.py tests/test_core.py -v --tb=short

  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build
